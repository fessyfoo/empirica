name: Dependency scan

# Weekly + on-demand pip-audit. Runs against the resolved dependency tree.
# Fails the run on any unfixed CVE so Dependabot has something to chase.
#
# Dependabot config lives at .github/dependabot.yml and handles the actual
# auto-PRs for vulnerable + outdated dependencies.

on:
  schedule:
    - cron: "17 6 * * 1"  # Monday 06:17 UTC — off the top-of-hour rush
  workflow_dispatch:
  pull_request:
    paths:
      - pyproject.toml
      - empirica-mcp/pyproject.toml

env:
  PYTHONUNBUFFERED: "1"

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install (release deps only — no dev/test)
        # Non-editable install so pip-audit can audit empirica + empirica-mcp
        # themselves alongside their dependencies. Editable installs
        # (`pip install -e .`) combined with `pip-audit --strict` always
        # fail: strict mode rejects skipped/unauditable distributions, and
        # editable installs can't be audited (no resolved wheel to compare
        # against the advisory database).
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install ./empirica-mcp
          pip install pip-audit

      - name: pip-audit (block on known CVEs)
        run: pip-audit --strict

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ── Lint + types ────────────────────────────────────────────────────
  # Fast feedback. Single Python version — lint/type rules don't vary
  # meaningfully across 3.10-3.13.
  lint-and-types:
    name: Lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev + optional extras)
        # Match the test job's install: pyright needs ALL imports resolvable
        # (flask, fastapi, mcp, textual, qdrant_client) to type-check the
        # source tree. Without the extras it floods with reportMissingImports
        # for legitimate optional-dep code paths.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,tui,vector]"
          pip install -e "./empirica-mcp[dev]"

      - name: ruff check
        run: ruff check empirica/ empirica-mcp/ tests/

      - name: ruff format --check
        run: ruff format --check empirica/ empirica-mcp/ tests/
        continue-on-error: true  # informational until format is enforced

      - name: pyright
        run: pyright empirica/ empirica-mcp/

  # ── Tests ───────────────────────────────────────────────────────────
  # Matrix on 3.11 (min for empirica-mcp) + 3.13 (current). empirica
  # itself still declares 3.10 in classifiers, but empirica-mcp requires
  # 3.11+ and we install it for the integration tests — so 3.10 doesn't
  # fit the CI shape. If 3.10 support becomes a hard guarantee, split
  # into separate jobs.
  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false  # partial coverage > none
      matrix:
        python: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev + optional extras)
        # tui + vector extras: required because some tests import
        # textual/qdrant_client at module top level (no skip-on-missing
        # guard yet). Bundle them in CI rather than rewriting tests.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,tui,vector]"
          pip install -e "./empirica-mcp[dev]"

      - name: pytest (empirica — excluding integration)
        # Integration tests need empirica CLI on PATH, git-initialized CWD,
        # and/or a populated sessions.db. They live behind the `integration`
        # marker and pass locally where the dev env satisfies those. On a
        # fresh CI runner they fail for environmental reasons unrelated to
        # the code being tested. Run them in a separate workflow (nightly /
        # on-demand) once the env-bootstrapping is wired.
        run: pytest tests/ -q --tb=short -m "not integration"

      - name: pytest (empirica-mcp)
        working-directory: empirica-mcp
        run: pytest tests/ -q --tb=short

  # ── Compliance + dep-audit ──────────────────────────────────────────
  # Dogfood empirica's own pipeline. Soft fail on lint/complexity warnings;
  # hard fail on CVEs (pip-audit non-zero).
  compliance:
    name: Compliance + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-types]  # don't run if lint is broken

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so compliance-report's release_chain check
          # can verify git_tag exists for the current version, and
          # ai_transparency can sample the last 50 commit authors. Default
          # fetch-depth: 1 makes both of those report false-negatives.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev + optional extras)
        # Match the lint job — pyright (run by compliance-report's
        # type_safety check) needs all optional-extra imports resolvable
        # (flask, fastapi, mcp, textual, qdrant_client). With just [dev]
        # it flooded with 80+ reportMissingImports.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,tui,vector]"
          pip install -e "./empirica-mcp[dev]"
          pip install pip-audit

      - name: empirica compliance-report
        run: empirica compliance-report --output json | tee compliance.json
        continue-on-error: true  # informational; doesn't gate merge yet

      - name: pip-audit (block on CVEs)
        run: pip-audit --skip-editable

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compliance-report-${{ github.sha }}
          path: compliance.json
          if-no-files-found: ignore
          retention-days: 30

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ── Lint + types ────────────────────────────────────────────────────
  # Fast feedback. Single Python version — lint/type rules don't vary
  # meaningfully across 3.10-3.13.
  lint-and-types:
    name: Lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check empirica/ empirica-mcp/ tests/

      - name: ruff format --check
        run: ruff format --check empirica/ empirica-mcp/ tests/
        continue-on-error: true  # informational until format is enforced

      - name: pyright
        run: pyright empirica/ empirica-mcp/

  # ── Tests ───────────────────────────────────────────────────────────
  # Matrix on min (3.10) and current (3.13) Python — declared range is
  # 3.10-3.13 per pyproject classifiers. Skip 3.11/3.12 in CI; they're
  # not where bugs live.
  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false  # partial coverage > none
      matrix:
        python: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: pytest
        run: pytest tests/ -q --tb=short

  # ── Compliance + dep-audit ──────────────────────────────────────────
  # Dogfood empirica's own pipeline. Soft fail on lint/complexity warnings;
  # hard fail on CVEs (pip-audit non-zero).
  compliance:
    name: Compliance + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-types]  # don't run if lint is broken

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: empirica compliance-report
        run: empirica compliance-report --output json | tee compliance.json
        continue-on-error: true  # informational; doesn't gate merge yet

      - name: pip-audit (block on CVEs)
        run: pip-audit --skip-editable

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report-${{ github.sha }}
          path: compliance.json
          if-no-files-found: ignore
          retention-days: 30
